name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'android-v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Instalar dependências
        run: npm ci

      - name: Build web
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Sincronizar Capacitor Android
        run: npx cap sync android

      - name: Desencriptar keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/wegest-release.jks

      - name: Atualizar versionCode
        run: |
          NEW_CODE=$((GITHUB_RUN_NUMBER + 2))
          sed -i "s/versionCode [0-9]*/versionCode $NEW_CODE/" android/app/build.gradle
          echo "versionCode → $NEW_CODE"

      - name: Dar permissão ao gradlew
        run: chmod +x android/gradlew

      - name: Forçar Gradle a usar Java 21
        run: echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Build AAB assinado
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Guardar AAB (descarregar em Actions → este workflow → Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: wegest-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
