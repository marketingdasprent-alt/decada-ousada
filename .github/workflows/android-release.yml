name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'android-v*'

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar dependências
        run: npm ci

      - name: Build web
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Sincronizar Capacitor Android
        run: npx cap sync android

      - name: Desencriptar keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/wegest-release.jks

      - name: Atualizar versionCode
        run: |
          NEW_CODE=$((GITHUB_RUN_NUMBER + 2))
          sed -i "s/versionCode [0-9]*/versionCode $NEW_CODE/" android/app/build.gradle
          echo "✅ versionCode atualizado para: $NEW_CODE"

      - name: Dar permissão ao gradlew
        run: chmod +x android/gradlew

      - name: Build AAB assinado
        working-directory: android
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Guardar AAB como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 7

      - name: Publicar no Google Play (produção)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.wegest.myapp
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: production
          status: completed
