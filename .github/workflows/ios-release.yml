name: iOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'ios-v*'

permissions:
  contents: read

jobs:
  build-and-upload-ios:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      BUNDLE_ID: app.lovable.dcede7f4c9ad4be0b601049f64aa866a
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
      APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Gerar projeto iOS do Capacitor
        run: |
          npx cap add ios || true
          npx cap sync ios

      - name: Instalar pods iOS
        run: |
          cd ios/App
          pod install --repo-update

      - name: Preparar ficheiros de assinatura
        run: |
          mkdir -p .ci_secrets
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"

          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_KEY_ID}.p8"
          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > .ci_secrets/certificate.p12
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > .ci_secrets/profile.mobileprovision

          security cms -D -i .ci_secrets/profile.mobileprovision > .ci_secrets/profile.plist

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' .ci_secrets/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' .ci_secrets/profile.plist)

          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

          cp .ci_secrets/profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

      - name: Criar keychain temporária
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import .ci_secrets/certificate.p12 -k build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s build.keychain login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Gerar ExportOptions.plist
        run: |
          cat > .ci_secrets/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Archive iOS
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            clean archive

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/output" \
            -exportOptionsPlist .ci_secrets/ExportOptions.plist

      - name: Upload de artefactos
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            ${{ runner.temp }}/output/*.ipa
            ${{ runner.temp }}/App.xcarchive

      - name: Enviar para TestFlight
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/output" -name '*.ipa' -maxdepth 1 | head -n 1)
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPLE_KEY_ID" \
            --apiIssuer "$APPLE_ISSUER_ID"

      - name: Limpeza final
        if: always()
        run: |
          security delete-keychain build.keychain || true
          rm -rf .ci_secrets
          rm -f "$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_KEY_ID}.p8"
